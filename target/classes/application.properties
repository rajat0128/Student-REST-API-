# ── Server Configuration ───────────────────────────────────────────────────────
server.port=8080

# ── Application Info ───────────────────────────────────────────────────────────
spring.application.name=student-api

# ── Actuator (Health check endpoint for Docker HEALTHCHECK) ───────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# App info shown at /actuator/info
info.app.name=Student API
info.app.version=1.0.0
info.app.description=DevOps Demo - Spring Boot REST API
